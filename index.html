<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanji Mind-Map · JLPT N5 / N4</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
</head>
<body>
  <header>
    <h1>Kanji Mind-Map</h1>
    <nav id="levels" aria-label="JLPT level">
      <button data-level="N5" class="active">N5</button>
      <button data-level="N4">N4</button>
      <button data-level="N3">N3</button>
      <button data-level="N2">N2</button>
    </nav>
    <div id="views" role="tablist" aria-label="View">
      <button data-view="trees" class="active">Trees</button>
      <button data-view="words">Words</button>
    </div>
  </header>
  <main>
    <section id="content" aria-live="polite"></section>
  </main>
  <aside id="detail" hidden></aside>
  <footer>
    Data: KANJIDIC2 &amp; JMdict © EDRDG, CC BY-SA 4.0.
    Kanji decomposition: CHISE / cjkvi-ids.
  </footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
